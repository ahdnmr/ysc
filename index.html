<!DOCTYPE html>
<html>
<head>
  <title>Yangın Tüp Listesi</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    table {
      border-collapse: collapse;
      width: 80%;
      margin: auto;
      margin-top: 10px;
    }

    th {
      background-color: #2c3e50;
      color: white;
      padding: 8px;
    }

    td {
      padding: 8px;
      text-align: center;
    }

    tr:nth-child(even) {
      background-color: #ecf0f1;
    }

    tr:nth-child(odd) {
      background-color: white;
    }

    table, th, td {
      border: 1px solid #bdc3c7;
    }
  </style>

  <!-- ✅ XLSX KÜTÜPHANESİ -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<!-- LOGO -->
<div>
  <img src="logo.png" width="350">
</div>

<br>

<input id="sayi" placeholder="TÜP NUMARASI GİRİNİZ">
<button onclick="liste()">GÖSTER</button>

<div id="sonuc"></div>

<script>
function liste(){

  let s = document.getElementById("sayi").value;
  let sonuc = "";

  // 
  fetch("veri.xlsx")
    .then(res => res.arrayBuffer())
    .then(data => {

      const wb = XLSX.read(data, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);

      let index = parseInt(s) - 1;

      if(json[index]){

        let row = json[index];

        sonuc = `
        <table>
          <tr>
            <th>TÜRÜ</th>
            <th>KONUM</th>
            <th>KG</th>
            <th>BASINÇ</th>
            <th>BASINÇ TEST TARİHİ</th>
            <th>BAKIM TARİHİ</th>
          </tr>

          <tr>
            <td>${row["TÜRÜ"]}</td>
            <td>${row["KONUM"]}</td>
            <td>${row["KG"]}</td>
            <td>${row["BASINÇ"]}</td>
            <td>${row["BASINÇ TEST TARİHİ"]}</td>
            <td>${row["BAKIM TARİHİ"]}</td>
          </tr>
        </table>
        `;
      }
      else{
        sonuc = "<b>Tanımsız seçim</b>";
      }

      document.getElementById("sonuc").innerHTML = sonuc;
    });

}
</script>

</body>
</html>
